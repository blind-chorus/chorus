name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run test:screens
      - run: npm run build:packages
      - name: Verify native tokens are in sync with schema
        run: |
          node packages/tokens-ios/scripts/check.mjs
          node packages/tokens-android/scripts/check.mjs
